# ── Producer: API + Scraper + PostgreSQL ──
# Run this on the machine that does the scraping.
# The DB is exposed on port 5433 for remote consumers.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: web_scraper
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"  # Bind to localhost only (remote access via SSH tunnel or firewall)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d web_scraper"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "5556:5556"
    environment:
      SCRAPER_DB_HOST: db
      SCRAPER_DB_PORT: "5432"
      SCRAPER_DB_NAME: web_scraper
      SCRAPER_DB_USER: scraper
      SCRAPER_DB_PASS: scraper2026
      API_PORT: "5556"
      # API Keys (comma-separated, or leave empty to auto-generate)
      API_KEYS: "${API_KEYS:-}"
      # Webhook: Telegram notifications for new content
      WEBHOOK_ENABLED: "${WEBHOOK_ENABLED:-false}"
      WEBHOOK_URL: "${WEBHOOK_URL:-}"
      WEBHOOK_CHAT_ID: "${WEBHOOK_CHAT_ID:-}"
      WEBHOOK_MIN_WORDS: "${WEBHOOK_MIN_WORDS:-50}"
      WEBHOOK_DOMAINS: "${WEBHOOK_DOMAINS:-}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
