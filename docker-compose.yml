services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: web_scraper
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper2026
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d web_scraper"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "5557:5556"
    environment:
      SCRAPER_DB_HOST: db
      SCRAPER_DB_PORT: "5432"
      SCRAPER_DB_NAME: web_scraper
      SCRAPER_DB_USER: scraper
      SCRAPER_DB_PASS: scraper2026
      API_PORT: "5556"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
